<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Регистрация</h2>
        <div id="ok" class="ok" style="display:none">Аккаунт создан!</div>
        <div id="error" class="error" style="display:none"></div>
        <form id="regForm">
            <input type="text" id="username" placeholder="Ник" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="submit">Зарегистрироваться</button>
        </form>
        <p class="admin-link"><a href="admin.html">Админ-панель</a></p>
    </div>
    <script src="app.js"></script>
</body>
</html>
