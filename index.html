<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reg Site</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="authContainer">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Вход</div>
            <div class="tab" onclick="switchTab('register')">Регистрация</div>
        </div>
        <div id="tab-login" class="tab-content active">
            <h2>Вход</h2>
            <div id="loginError" class="error" style="display:none"></div>
            <form id="loginForm">
                <input type="text" id="loginUsername" placeholder="Ник" required autocomplete="off">
                <input type="password" id="loginPassword" placeholder="Пароль" required>
                <button type="submit" class="btn-success">Войти</button>
            </form>
        </div>
        <div id="tab-register" class="tab-content">
            <h2>Регистрация</h2>
            <div id="regOk" class="ok" style="display:none">Аккаунт создан! Теперь войдите.</div>
            <div id="regError" class="error" style="display:none"></div>
            <form id="regForm">
                <input type="text" id="regUsername" placeholder="Ник" required autocomplete="off">
                <input type="password" id="regPassword" placeholder="Пароль (мин. 4 символа)" required>
                <button type="submit">Зарегистрироваться</button>
            </form>
        </div>
        <p class="admin-link"><a href="admin.html">Админ-панель</a></p>
    </div>

    <div class="container" id="dashboardContainer" style="display:none;max-width:560px">
        <div class="dashboard-header" style="padding-bottom:10px;margin-bottom:12px">
            <div>
                <span id="dashUsername" style="font-weight:700;color:#1a1a2e"></span>
                <span class="user-info" id="dashUserInfo" style="margin-left:8px;font-size:12px"></span>
            </div>
            <button class="logout-btn btn-secondary" onclick="logout()" style="padding:5px 12px;font-size:12px">Выйти</button>
        </div>

        <div class="game-wrapper">
            <div class="game-header">
                <div class="score-box" id="scoreDisplay">0</div>
                <button class="btn-secondary" style="width:auto;padding:8px 14px;font-size:13px;margin:0" onclick="newGame()">Новая игра</button>
            </div>
            <div class="game-container">
                <div class="grid" id="grid"></div>
                <div class="game-overlay" id="gameOverlay">
                    <h3 id="overlayTitle">Игра окончена!</h3>
                    <p id="overlayScore">Счёт: 0</p>
                    <button class="btn-success" onclick="newGame()">Играть снова</button>
                </div>
            </div>
            <div class="game-header" style="margin-top:10px">
                <div class="best-score" id="bestScoreDisplay">🏆 Лучший: 0</div>
                <span style="font-size:13px;color:#666">Управление: стрелки</span>
            </div>
        </div>

        <div class="leaderboard" id="leaderboardSection">
            <h3>🏆 Таблица лидеров</h3>
            <table>
                <thead><tr><th>#</th><th>Игрок</th><th>Счёт</th></tr></thead>
                <tbody id="leaderboardBody"></tbody>
            </table>
            <p id="lbEmpty" style="text-align:center;color:#999;margin-top:10px;display:none">Пока нет рекордов</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
