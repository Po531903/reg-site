<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ — все пользователи</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f2f2f2; }
        td { font-family: monospace; font-size: 12px; word-break: break-all; }
    </style>
</head>
<body>
    <h2>Все зарегистрированные пользователи</h2>
    {% if users %}
    <table>
        <tr><th>ID</th><th>Ник</th><th>Хеш пароля</th><th>Дата</th></tr>
        {% for u in users %}
        <tr>
            <td>{{ u[0] }}</td>
            <td>{{ u[1] }}</td>
            <td>{{ u[2] }}</td>
            <td>{{ u[3] }}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <p>Пока нет ни одного пользователя.</p>
    {% endif %}
    <p style="margin-top:20px"><a href="/register">← На регистрацию</a></p>
</body>
</html>
