<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Админ-панель</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:999">
    <div class="container" style="max-width:360px;text-align:center">
        <h2>🔐 Вход в админку</h2>
        <div id="loginError" class="error" style="display:none">Неверный пароль</div>
        <input type="password" id="adminPass" placeholder="Пароль администратора" autocomplete="off">
        <button onclick="checkAdminPass()">Войти</button>
    </div>
</div>

<div id="adminContent" style="display:none">
    <div class="container" style="max-width:800px">
        <div class="dashboard-header">
            <div>
                <h2>👑 Админ-панель</h2>
                <div class="user-info">Управление пользователями и рекордами</div>
            </div>
            <button class="logout-btn btn-secondary" onclick="lockAdmin()">Заблокировать</button>
        </div>

        <div class="admin-stats">
            <div class="stat-card">
                <div class="num" id="statTotal">0</div>
                <div class="label">Всего пользователей</div>
            </div>
            <div class="stat-card">
                <div class="num" id="statVerified">0</div>
                <div class="label">Подтвердили email</div>
            </div>
            <div class="stat-card">
                <div class="num" id="statBanned">0</div>
                <div class="label">Заблокировано</div>
            </div>
            <div class="stat-card">
                <div class="num" id="statTop">0</div>
                <div class="label">Рекордный счёт</div>
            </div>
            <div class="stat-card">
                <div class="num" id="statGames">0</div>
                <div class="label">Игроков в 2048</div>
            </div>
        </div>

        <div class="admin-actions">
            <button class="btn-danger" onclick="clearUsers()">🗑 Очистить всех</button>
            <button class="btn-secondary" onclick="location.reload()">🔄 Обновить</button>
        </div>

        <div class="search-box">
            <input type="text" id="adminSearch" placeholder="🔍 Поиск по нику..." oninput="filterAdmin()">
        </div>

        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Ник</th>
                        <th>Email</th>
                        <th>Подтв.</th>
                        <th>Статус</th>
                        <th>Дата</th>
                        <th>Рекорд</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>

        <p class="admin-link"><a href="index.html">← На главную</a></p>
    </div>
</div>

<script>
const ALLOWED_IP = "85.174.192.104";
fetch("https://api.ipify.org?format=json").then(function(r) { return r.json(); }).then(function(d) {
    if (d.ip !== ALLOWED_IP) {
        document.body.innerHTML = "<div class='container' style='text-align:center;margin-top:100px'><h2>403 Forbidden</h2><p>Доступ только с доверенного устройства.</p></div>";
    }
}).catch(function() {});
</script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="app.js"></script>
</body>
</html>
